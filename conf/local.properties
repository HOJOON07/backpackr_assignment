# Local execution profile (inside the Docker container).
# Paths are container-internal; ./data and ./conf are bind-mounted from the host.

env=local
spark.master=local[*]

# Hive metastore: built-in local (Derby). No external server.
metastore.mode=local
warehouse.path=file:///opt/app/spark-warehouse

# I/O
input.path=file:///opt/app/data/raw
output.path=file:///opt/app/data/warehouse/ecommerce_activity_events
manifest.path=file:///opt/app/data/manifests/batch_runs

# Catalog
database=ecommerce
table=activity_events

# Sessionization
session.gap.seconds=300

# CSV
csv.header=true
